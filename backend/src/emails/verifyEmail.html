<!doctype html>
<html lang="en">
  <body style="font-family: sans-serif; color: #1a1a1a; line-height: 1.5">
    <h2>Welcome to Bangla AI Hub, {{userName}}!</h2>
    <p>Please confirm your email address to activate all features of your account.</p>
    <p>
      <a
        href="{{verifyUrl}}"
        style="
          background: #0f766e;
          color: #ffffff;
          padding: 10px 20px;
          text-decoration: none;
          border-radius: 6px;
        "
      >
        Verify my email
      </a>
    </p>
    <p>
      This link expires in 24 hours. If you didn't create this account, you can safely ignore this
      email.
    </p>
  </body>
</html>
